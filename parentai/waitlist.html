<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParentAI — Waitlist Emails</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f6ff;
      color: #0f172a;
      padding: 40px 5%;
      min-height: 100vh;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }
    .toolbar {
      display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid rgba(37,99,235,0.2);
      background: #ffffff;
      color: #0f172a;
      font-size: 0.875rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { border-color: #2563eb; color: #2563eb; }
    .btn-primary {
      background: #2563eb;
      color: #ffffff;
      border-color: #2563eb;
    }
    .btn-primary:hover { opacity: 0.85; color: #ffffff; }
    .btn-danger {
      border-color: rgba(248,113,113,0.3);
      color: #f87171;
    }
    .btn-danger:hover { background: #fef2f2; border-color: #f87171; }
    .count {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(37,99,235,0.08);
      color: #2563eb;
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 24px;
    }
    table {
      width: 100%;
      max-width: 700px;
      border-collapse: collapse;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(37,99,235,0.1);
    }
    th {
      text-align: left;
      padding: 14px 20px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: #f8fafc;
      border-bottom: 1px solid rgba(37,99,235,0.1);
    }
    td {
      padding: 12px 20px;
      font-size: 0.9rem;
      border-bottom: 1px solid rgba(37,99,235,0.06);
    }
    tr:last-child td { border-bottom: none; }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
      font-size: 0.95rem;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #0f172a;
      color: #ffffff;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.875rem;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    a.back {
      display: inline-block;
      margin-bottom: 24px;
      color: #2563eb;
      text-decoration: none;
      font-size: 0.9rem;
    }
    a.back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <a href="index.html" class="back">← Back to site</a>
  <h1>Waitlist Signups</h1>
  <p class="subtitle">All emails submitted through the waitlist forms.</p>

  <div class="count" id="count"></div>

  <div class="toolbar">
    <button class="btn btn-primary" id="copyBtn">Copy all emails</button>
    <button class="btn" id="exportBtn">Export CSV</button>
    <button class="btn btn-danger" id="clearBtn">Clear all</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Email</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="toast" id="toast"></div>

  <script>
    function loadEmails() {
      return JSON.parse(localStorage.getItem('parentai_waitlist') || '[]');
    }

    function render() {
      const emails = loadEmails();
      const tbody = document.getElementById('tbody');
      const count = document.getElementById('count');

      count.textContent = `${emails.length} signup${emails.length !== 1 ? 's' : ''}`;

      if (!emails.length) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty">No signups yet. Emails will appear here when someone joins the waitlist.</td></tr>';
        return;
      }

      tbody.innerHTML = emails.map((entry, i) => {
        const d = new Date(entry.date);
        const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
          ' · ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        return `<tr><td>${i + 1}</td><td>${escapeHtml(entry.email)}</td><td>${dateStr}</td></tr>`;
      }).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    document.getElementById('copyBtn').addEventListener('click', () => {
      const emails = loadEmails().map(e => e.email).join('\n');
      if (!emails) { showToast('No emails to copy'); return; }
      navigator.clipboard.writeText(emails).then(() => showToast('Copied to clipboard!'));
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      const emails = loadEmails();
      if (!emails.length) { showToast('No emails to export'); return; }
      const csv = 'Email,Date\n' + emails.map(e => `${e.email},${e.date}`).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'parentai-waitlist.csv';
      a.click();
      URL.revokeObjectURL(url);
      showToast('CSV downloaded!');
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (confirm('Are you sure you want to clear all waitlist emails?')) {
        localStorage.removeItem('parentai_waitlist');
        render();
        showToast('Waitlist cleared');
      }
    });

    render();
  </script>
</body>
</html>
